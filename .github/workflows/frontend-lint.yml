name: Frontend Lint

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  lint-html:
    name: Lint HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Lint HTML files
        run: htmlhint "src/main/resources/templates/**/*.html" --config '{"tagname-lowercase":true,"attr-lowercase":true,"doctype-first":false}'

  lint-css:
    name: Lint CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Create stylelint config
        run: echo '{"extends":"stylelint-config-standard","rules":{"no-empty-source":null,"selector-class-pattern":null,"custom-property-pattern":null}}' > .stylelintrc.json

      - name: Lint CSS files
        run: stylelint "src/main/resources/static/css/**/*.css" --allow-empty-input

  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install eslint
        run: npm install -g eslint

      - name: Create eslint config
        run: |
          cat > eslint.config.mjs << 'ESLINTEOF'
          export default [
            {
              files: ["src/main/resources/static/js/**/*.js"],
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "off",
                "semi": ["warn", "always"],
                "no-console": "off"
              }
            }
          ];
          ESLINTEOF

      - name: Lint JavaScript files
        run: eslint "src/main/resources/static/js/**/*.js"
